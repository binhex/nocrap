# nocrap GoReleaser config — builds linux/amd64 and linux/arm64 binaries
# on tag push (v*), triggered by .github/workflows/release.yml

version: 2

before:
  hooks: []

builds:
  - id: nocrap
    binary: nocrap
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    overrides:
      - goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
    ldflags:
      - -s -w
    flags:
      - -trimpath
